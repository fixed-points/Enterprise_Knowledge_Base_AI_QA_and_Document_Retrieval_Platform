spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/knowledgebase;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
